server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # React Router 지원 (새로고침 시 index.html 반환)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 요청을 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
